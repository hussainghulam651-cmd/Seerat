<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result Card - Al-Fareed Public School</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Arial',sans-serif;background:#f0f4f0;padding:20px;min-height:100vh;display:flex;align-items:flex-start;justify-content:center}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.12);max-width:520px;width:100%;overflow:hidden}

/* HEADER */
.card-header{background:linear-gradient(135deg,#0d5c2e,#0a3d1f);padding:18px 20px;color:#fff;display:flex;align-items:center;gap:12px}
.school-logo{width:50px;height:50px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:2px solid #e8b84b;overflow:hidden}
.school-logo img{width:100%;height:100%;object-fit:cover}
.school-name{font-size:15px;font-weight:700;color:#e8b84b;letter-spacing:.3px}
.school-addr{font-size:10px;opacity:.75;margin-top:2px}
.exam-badge{background:#e8b84b;color:#1a2a1a;font-size:9px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px;margin-top:4px;display:inline-block}

/* STUDENT INFO */
.student-section{padding:14px 18px;border-bottom:1px solid #e8f5e9}
.student-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.info-box{border:1px solid #c8e6c9;border-radius:7px;padding:6px 10px}
.info-label{font-size:8px;color:#5a6e5a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.info-val{font-size:13px;font-weight:700;color:#1a2a1a}
.info-box.full{grid-column:1/-1}

/* MARKS TABLE */
.table-section{padding:0 18px 4px}
.sec-title{font-size:10px;font-weight:700;color:#0d5c2e;text-transform:uppercase;letter-spacing:.5px;padding:10px 0 6px;display:flex;align-items:center;gap:5px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#0d5c2e;color:#fff}
thead th{padding:7px 10px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.3px}
tbody tr:nth-child(even){background:#f0faf4}
tbody td{padding:6px 10px;border-bottom:1px solid #e0f0e0}
.pct-bar{width:60px;height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:4px}
.pct-fill{height:100%;border-radius:3px;background:#0d5c2e}
tfoot tr{background:#0d5c2e;color:#fff}
tfoot td{padding:7px 10px;font-weight:700;font-size:12px}

/* RESULT SUMMARY */
.summary{display:grid;grid-template-columns:repeat(4,1fr);border-top:2px solid #0d5c2e;border-bottom:1px solid #e0e0e0}
.sum-box{padding:12px 8px;text-align:center;border-right:1px solid #e0e0e0}
.sum-box:last-child{border-right:none}
.sum-label{font-size:8px;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.sum-val{font-size:17px;font-weight:700}
.sum-box:nth-child(2) .sum-val{color:#0d5c2e}
.sum-box:nth-child(3) .sum-val{color:#1565c0}
.sum-box:nth-child(4) .sum-val{color:#e65100;font-size:19px}

/* REMARKS */
.remarks-section{padding:10px 18px;background:#f8fcf9;border-bottom:1px solid #e8f5e9}
.remarks-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#5a6e5a;margin-bottom:4px}
.remarks-text{font-size:12px;color:#333;font-style:italic;line-height:1.5}

/* SIGNATURES */
.signatures{display:flex;justify-content:space-between;padding:12px 18px 14px;border-top:1px dashed #ccc}
.sig-item{text-align:center;flex:1}
.sig-line{border-top:1px solid #999;margin-bottom:4px;height:30px}
.sig-label{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.3px}

/* PRINT BUTTON */
.print-bar{background:#0d5c2e;padding:12px 18px;display:flex;gap:10px;justify-content:center}
.print-btn{background:#e8b84b;color:#1a2a1a;border:none;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif}
.wa-btn{background:#25d366;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif}

.grade-A{color:#27ae60}.grade-B{color:#2980b9}.grade-C{color:#f39c12}.grade-D{color:#e74c3c}

@media print{
  body{background:#fff;padding:0}
  .print-bar{display:none}
  .card{box-shadow:none;border-radius:0;max-width:100%}
}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="school-logo" id="logo-box">🏫</div>
    <div>
      <div class="school-name" id="school-name">AL-FAREED PUBLIC SCHOOL</div>
      <div class="school-addr">Tando Jam, Sindh</div>
      <div class="exam-badge" id="exam-badge">RESULT CARD</div>
    </div>
  </div>

  <div class="student-section">
    <div class="info-box full" style="margin-bottom:6px">
      <div class="info-label">Student Name</div>
      <div class="info-val" id="s-name" style="font-size:16px">—</div>
    </div>
    <div class="student-row">
      <div class="info-box"><div class="info-label">Class</div><div class="info-val" id="s-class">—</div></div>
      <div class="info-box"><div class="info-label">Exam</div><div class="info-val" id="s-exam">—</div></div>
    </div>
    <div class="student-row">
      <div class="info-box"><div class="info-label">Date</div><div class="info-val" id="s-date">—</div></div>
      <div class="info-box"><div class="info-label">Year</div><div class="info-val" id="s-year">—</div></div>
    </div>
  </div>

  <div class="table-section">
    <div class="sec-title">📚 Subject-wise Marks</div>
    <table>
      <thead><tr><th>Subject</th><th style="text-align:right">Total</th><th style="text-align:right">Marks</th><th style="text-align:right">%</th></tr></thead>
      <tbody id="marks-body"></tbody>
      <tfoot><tr><td><b>GRAND TOTAL</b></td><td id="f-total" style="text-align:right">—</td><td id="f-obtained" style="text-align:right">—</td><td id="f-pct" style="text-align:right">—</td></tr></tfoot>
    </table>
  </div>

  <div class="summary">
    <div class="sum-box"><div class="sum-label">Grand Total</div><div class="sum-val" id="sum-total">—</div></div>
    <div class="sum-box"><div class="sum-label">Obtained</div><div class="sum-val" id="sum-obtained">—</div></div>
    <div class="sum-box"><div class="sum-label">Percentage</div><div class="sum-val" id="sum-pct">—</div></div>
    <div class="sum-box"><div class="sum-label">Grade</div><div class="sum-val" id="sum-grade">—</div></div>
  </div>

  <div class="remarks-section">
    <div class="remarks-title">Teacher's Remarks</div>
    <div class="remarks-text" id="remarks-text">—</div>
  </div>

  <div class="signatures">
    <div class="sig-item"><div class="sig-line"></div><div class="sig-label">Class Teacher</div></div>
    <div class="sig-item"><div class="sig-line"></div><div class="sig-label">Parent</div></div>
    <div class="sig-item"><div class="sig-line"></div><div class="sig-label">Principal</div></div>
  </div>

  <div class="print-bar">
    <button class="print-btn" onclick="window.print()">🖨️ Print</button>
    <button class="wa-btn" onclick="shareWA()">📱 WhatsApp</button>
  </div>
</div>

<script>
function getParam(name){
  var url=window.location.search;
  var reg=new RegExp('[?&]'+name+'=([^&]*)');
  var m=url.match(reg);
  return m?decodeURIComponent(m[1].replace(/\+/g,' ')):'';
}

function grOf(pct){
  if(pct>=80)return{g:'A',r:'🌟 Excellent! Shabash! Outstanding performance.'};
  if(pct>=65)return{g:'B',r:'👍 Good performance! Keep it up.'};
  if(pct>=50)return{g:'C',r:'📚 Average performance. More effort needed.'};
  return{g:'D',r:'📚 Mehnat jari rakhein! Work harder next time.'};
}

function init(){
  var name=getParam('name');
  var cls=getParam('class');
  var exam=getParam('exam');
  var year=getParam('year');
  var subsRaw=getParam('subjects');

  // Set student info
  document.getElementById('s-name').textContent=name||'Student Name';
  document.getElementById('s-class').textContent=cls||'—';
  document.getElementById('s-exam').textContent=exam||'—';
  document.getElementById('s-year').textContent=year||new Date().getFullYear();
  document.getElementById('s-date').textContent=new Date().toLocaleDateString('en-PK',{day:'2-digit',month:'short',year:'numeric'});
  document.getElementById('exam-badge').textContent=(exam||'RESULT CARD').toUpperCase();
  document.title='Result Card - '+name;

  // Parse subjects: name:obt:tot|name:obt:tot
  var subs=[];
  if(subsRaw){
    subsRaw.split('|').forEach(function(s){
      var parts=s.split(':');
      if(parts.length>=3){
        subs.push({name:parts[0],obt:parseFloat(parts[1])||0,tot:parseFloat(parts[2])||100});
      } else if(parts.length===2){
        subs.push({name:parts[0],obt:parseFloat(parts[1])||0,tot:100});
      }
    });
  }

  // Build marks table
  var tbody=document.getElementById('marks-body');
  var gtotal=0,gobt=0;
  subs.forEach(function(s){
    gtotal+=s.tot;gobt+=s.obt;
    var pct=s.tot?Math.round(s.obt/s.tot*100):0;
    var barW=Math.min(pct,100);
    var row=document.createElement('tr');
    row.innerHTML='<td>'+s.name+'</td>'
      +'<td style="text-align:right">'+s.tot+'</td>'
      +'<td style="text-align:right"><b>'+s.obt+'</b></td>'
      +'<td style="text-align:right">'+pct+'%<div class="pct-bar"><div class="pct-fill" style="width:'+barW+'%"></div></div></td>';
    tbody.appendChild(row);
  });

  var gpct=gtotal?Math.round(gobt/gtotal*100):0;
  var gr=grOf(gpct);

  // Table footer
  document.getElementById('f-total').textContent=gtotal;
  document.getElementById('f-obtained').textContent=gobt;
  document.getElementById('f-pct').textContent=gpct+'%';

  // Summary
  document.getElementById('sum-total').textContent=gtotal;
  document.getElementById('sum-obtained').textContent=gobt;
  document.getElementById('sum-pct').textContent=gpct+'%';
  var grEl=document.getElementById('sum-grade');
  grEl.textContent=gr.g;
  grEl.className='sum-val grade-'+gr.g;

  // Remarks
  document.getElementById('remarks-text').textContent=gr.r;

  // Strong subjects
  var strong=subs.filter(function(s){return s.tot&&(s.obt/s.tot)>=0.75;}).map(function(s){return s.name;});
  if(strong.length){
    document.getElementById('remarks-text').textContent+='\n⭐ Strong in: '+strong.join(', ');
  }
}

function shareWA(){
  var name=getParam('name')||'Student';
  var cls=getParam('class')||'—';
  var exam=getParam('exam')||'Exam';
  var url=window.location.href;
  var text='🏫 *AL-FAREED PUBLIC SCHOOL*\n📍 Tando Jam, Sindh\n──────────────────────────\n\n📊 *RESULT CARD*\n👤 Student: *'+name+'*\n📚 Class: '+cls+'\n📝 Exam: '+exam+'\n\n🖨️ *Full Result Card:*\n'+url;
  window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');
}

init();
</script>
</body>
</html>
