<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Report - Al-Fareed Public School</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Serif+4:wght@400;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f5f0e8; font-family:'Source Serif 4',Georgia,serif; padding:20px; display:flex; flex-direction:column; align-items:center; }
  .top-bar { background:#1a7a3c; color:white; padding:10px 20px; border-radius:8px; margin-bottom:20px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center; width:100%; max-width:680px; }
  .top-bar button { background:white; color:#1a7a3c; border:none; padding:8px 18px; border-radius:6px; font-weight:bold; cursor:pointer; }
  .report { background:white; width:100%; max-width:680px; border:3px solid #1a7a3c; border-radius:10px; overflow:hidden; box-shadow:0 6px 20px rgba(0,0,0,0.12); }
  .report-header { background:#1a7a3c; color:white; padding:20px; text-align:center; display:flex; align-items:center; justify-content:center; gap:15px; flex-wrap:wrap; }
  .monogram-wrap { width:55px; height:55px; border-radius:50%; border:2px solid #f0c040; overflow:hidden; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.15); flex-shrink:0; }
  .monogram-wrap img { width:100%; height:100%; object-fit:cover; }
  .mono-def .af { color:#f0d700; font-size:16px; font-weight:bold; text-align:center; }
  .mono-def .sm { color:#f0c040; font-size:5px; text-align:center; line-height:1.4; }
  .header-text h2 { font-size:11px; letter-spacing:2px; opacity:0.85; }
  .header-text h1 { font-family:'Playfair Display',serif; font-size:20px; margin-top:4px; }
  .meta { padding:12px 20px; background:#f0f9f4; display:flex; flex-wrap:wrap; gap:10px; border-bottom:2px solid #1a7a3c; }
  .meta-item { flex:1; min-width:130px; }
  .meta-item label { font-size:11px; text-transform:uppercase; color:#888; letter-spacing:1px; }
  .meta-item p { font-weight:600; color:#1a1a1a; font-size:15px; }
  table { width:100%; border-collapse:collapse; }
  th { background:#1a7a3c; color:white; padding:10px 12px; font-size:13px; text-align:left; }
  td { padding:9px 12px; border-bottom:1px solid #eee; font-size:14px; }
  tr:nth-child(even) td { background:#f9f9f9; }
  .present { color:#2e7d32; font-weight:bold; }
  .absent { color:#c62828; font-weight:bold; }
  .summary-bar { display:flex; justify-content:space-around; padding:15px; background:#f0f9f4; border-top:2px solid #1a7a3c; flex-wrap:wrap; gap:10px; }
  .sum-item { text-align:center; }
  .sum-val { font-family:'Playfair Display',serif; font-size:22px; color:#1a7a3c; font-weight:700; }
  .sum-lbl { font-size:12px; color:#666; }
  .sig-row { display:flex; justify-content:space-between; padding:15px 25px; border-top:1px dashed #ccc; }
  .sig-box { text-align:center; width:42%; }
  .sig-img { max-height:40px; max-width:120px; object-fit:contain; display:block; margin:0 auto 2px; }
  .sig-line { border-top:1.5px solid #333; margin-bottom:5px; }
  .sig-label { font-size:12px; color:#666; }
  .sig-name { font-size:11px; font-weight:bold; color:#333; }
  .footer { text-align:center; padding:12px; font-size:12px; color:#999; font-style:italic; border-top:1px dashed #ccc; }
  @media print { body{background:white; padding:0;} .top-bar{display:none!important;} .report{box-shadow:none; max-width:100%;} }
</style>
</head>
<body>
<div class="top-bar">
  <span style="font-size:15px; align-self:center;">✅ Attendance Report Ready</span>
  <button onclick="window.print()">🖨️ Print / Save PDF</button>
  <button onclick="window.close()">✖ Close</button>
</div>
<div class="report">
  <div class="report-header">
    <div class="monogram-wrap" id="mWrap">
      <div class="mono-def" id="mDef"><div class="af">AF</div><div class="sm">AL-FAREED<br>PUBLIC SCHOOL</div></div>
      <img id="mImg" src="" style="display:none" alt="Monogram">
    </div>
    <div class="header-text">
      <h2>AL-FAREED PUBLIC SCHOOL • TANDO JAM</h2>
      <h1>Attendance Report</h1>
    </div>
  </div>
  <div class="meta">
    <div class="meta-item"><label>Class</label><p id="cls">-</p></div>
    <div class="meta-item"><label>Date</label><p id="dat">-</p></div>
    <div class="meta-item"><label>Total Students</label><p id="tot">-</p></div>
  </div>
  <table>
    <thead><tr><th>#</th><th>Student Name</th><th>Status</th></tr></thead>
    <tbody id="attTable"></tbody>
  </table>
  <div class="summary-bar">
    <div class="sum-item"><div class="sum-val" id="pCount">0</div><div class="sum-lbl">Present</div></div>
    <div class="sum-item"><div class="sum-val" id="aCount">0</div><div class="sum-lbl">Absent</div></div>
    <div class="sum-item"><div class="sum-val" id="pPct">0%</div><div class="sum-lbl">Attendance %</div></div>
  </div>
  <div class="sig-row">
    <div class="sig-box">
      <img id="tSigImg" class="sig-img" src="" style="display:none" alt="Teacher Sig">
      <div class="sig-line"></div>
      <div class="sig-label">Class Teacher</div>
      <div class="sig-name" id="tSigName"></div>
    </div>
    <div class="sig-box">
      <div class="sig-line"></div>
      <div class="sig-label">Principal</div>
      <div class="sig-name">Sir Ghulam Hussain</div>
    </div>
  </div>
  <div class="footer">Generated by Al-Fareed School Portal • Tando Jam</div>
</div>
<script>
  const saved = localStorage.getItem('alfMonogramImage');
  if (saved) { document.getElementById('mDef').style.display='none'; const i=document.getElementById('mImg'); i.src=saved; i.style.display='block'; }
  const tSig = localStorage.getItem('alfTeacherSignature');
  if (tSig) { const si=document.getElementById('tSigImg'); si.src=tSig; si.style.display='block'; }
  const tName = localStorage.getItem('alfTeacherSigName');
  if (tName) document.getElementById('tSigName').textContent = tName;
  const p = new URLSearchParams(window.location.search);
  document.getElementById('cls').textContent = p.get('class') || '-';
  document.getElementById('dat').textContent = p.get('date') || new Date().toLocaleDateString();
  const raw = p.get('students') || '';
  const tbody = document.getElementById('attTable');
  let present = 0, absent = 0;
  if (raw) {
    raw.split('|').forEach((s, i) => {
      const [name, status] = s.split(':');
      const st = status || 'P';
      if (st === 'P') present++; else absent++;
      const cls = st === 'P' ? 'present' : 'absent';
      const label = st === 'P' ? '✅ Present' : '❌ Absent';
      tbody.innerHTML += `<tr><td>${i+1}</td><td>${name}</td><td class="${cls}">${label}</td></tr>`;
    });
  }
  const total = present + absent;
  document.getElementById('tot').textContent = total;
  document.getElementById('pCount').textContent = present;
  document.getElementById('aCount').textContent = absent;
  document.getElementById('pPct').textContent = total ? Math.round((present/total)*100)+'%' : '0%';
  if (p.get('print') === '1') setTimeout(() => window.print(), 800);
</script>
</body>
</html>
